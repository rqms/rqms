<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0 text-sm">
    <title>RQMS - Artist Setup (Dual QR)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0f172a] text-white min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-[#1e293b] rounded-3xl p-8 border border-slate-700 shadow-2xl">
        <h1 class="text-3xl font-black text-emerald-400 text-center mb-8">RQMS 🎸</h1>
        
        <div id="setup-form" class="space-y-4">
            <input type="text" id="name" placeholder="ชื่อศิลปิน / วงดนตรี" class="w-full p-4 bg-slate-800 rounded-xl border border-slate-600 outline-none focus:border-emerald-500 text-white">
            <input type="password" id="pin" maxlength="6" inputmode="numeric" placeholder="ตั้ง PIN 6 หลัก" class="w-full p-4 bg-slate-800 rounded-xl border border-slate-600 outline-none focus:border-emerald-500 text-white text-center text-xl tracking-[0.3em]">
            <button onclick="registerNow()" id="btn" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-bold transition-all">สร้างระบบและรับ QR Code</button>
        </div>

        <div id="result-area" class="hidden text-center space-y-8">
            <div class="space-y-2">
                <p class="text-emerald-400 font-black text-sm uppercase">1. ใบสำหรับวางหน้าเวที</p>
                <div class="bg-white p-3 rounded-2xl inline-block shadow-xl border-4 border-emerald-500">
                    <img id="qr-public" class="w-48 h-48" src="" alt="Public QR">
                </div>
                <p class="text-[10px] text-slate-400">ให้ลูกค้าสแกนเพื่อขอเพลงและให้ทิป</p>
            </div>

            <hr class="border-slate-700">

            <div class="space-y-2">
                <p class="text-orange-400 font-black text-sm uppercase">2. ใบสำหรับเข้าหลังบ้าน (ADMIN)</p>
                <div class="bg-white p-3 rounded-2xl inline-block shadow-xl border-4 border-orange-500">
                    <img id="qr-admin" class="w-48 h-48" src="" alt="Admin QR">
                </div>
                <p class="text-[10px] text-orange-200 font-bold">⚠️ สำคัญ: เซฟรูปนี้เก็บไว้ในเครื่อง!<br>ใช้สแกนเข้า Dashboard ได้ทันทีโดยไม่ต้องใส่ PIN</p>
            </div>
            
            <button onclick="location.reload()" class="text-slate-500 text-xs underline">สร้างวงอื่นเพิ่ม</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://uswpewtkfccqncjlmeus.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzd3Bld3RrZmNjcW5jamxtZXVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjE1MzQsImV4cCI6MjA5MDQzNzUzNH0.qQPQMzI2J_87Pu6M9FRHEeLL2hk9rabpUK4yiYOrKBc";
        const sbClient = supabase.createClient(SB_URL, SB_KEY);

        async function registerNow() {
            const name = document.getElementById('name').value;
            const pin = document.getElementById('pin').value;
            if(!name || pin.length < 6) return alert("กรุณากรอกชื่อวงและ PIN 6 หลัก");

            document.getElementById('btn').innerText = "กำลังสร้าง...";
            const artistId = 'art-' + Math.random().toString(36).substr(2, 9);
            
            try {
                const { error } = await sbClient.from('musicians').insert([{ id: artistId, display_name: name, pin: pin }]);
                if(error) throw error;

                const fullBase = window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
                
                const publicLink = fullBase + 'request.html?id=' + artistId;
                const adminLink = fullBase + 'dashboard.html?id=' + artistId + '&auth=' + btoa(pin); // ส่ง PIN แบบเข้ารหัสเบื้องต้น

                document.getElementById('qr-public').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(publicLink)}`;
                document.getElementById('qr-admin').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(adminLink)}`;
                
                document.getElementById('setup-form').style.display = 'none';
                document.getElementById('result-area').classList.remove('hidden');
            } catch (e) { alert(e.message); }
        }
    </script>
</body>
</html>
