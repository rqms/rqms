<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RQMS - Artist Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0f172a] text-white min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-[#1e293b] rounded-3xl p-8 border border-slate-700 shadow-2xl">
        <h1 class="text-3xl font-black text-emerald-400 text-center mb-8">RQMS 🎸</h1>
        
        <div id="setup-form" class="space-y-4">
            <input type="text" id="name" placeholder="ชื่อศิลปิน / วงดนตรี" class="w-full p-4 bg-slate-800 rounded-xl border border-slate-600 outline-none focus:border-emerald-500 text-white">
            <input type="text" id="pay" placeholder="PromptPay (เบอร์โทร/เลขบัตร)" class="w-full p-4 bg-slate-800 rounded-xl border border-slate-600 outline-none focus:border-emerald-500 text-white">
            <button onclick="registerNow()" id="btn" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-bold transition-all">สร้างระบบและรับ QR Code</button>
        </div>

        <div id="result-area" class="hidden text-center space-y-6">
            <div class="bg-white p-4 rounded-2xl inline-block shadow-xl">
                <img id="qrcode-img" class="w-64 h-64" src="" alt="QR Code">
            </div>
            <p class="text-emerald-400 font-bold text-xl">บันทึก QR ไปแปะหน้าเวทีได้เลย!</p>
            <div class="bg-slate-800 p-4 rounded-xl text-left border border-slate-700">
                <p class="text-xs text-slate-400 mb-2 text-center">ลิงก์หน้า Dashboard สำหรับเปิดใน iPad:</p>
                <a id="dash-link" href="#" target="_blank" class="text-blue-400 underline break-all text-sm block text-center">คลิกเปิด Dashboard</a>
            </div>
        </div>
    </div>

    <script>
        // --- ใส่ URL และ KEY ของพี่ตรงนี้ ---
        const SB_URL = "https://uswpewtkfccqncjlmeus.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzd3Bld3RrZmNjcW5jamxtZXVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjE1MzQsImV4cCI6MjA5MDQzNzUzNH0.qQPQMzI2J_87Pu6M9FRHEeLL2hk9rabpUK4yiYOrKBc";
        // ---------------------------------

        const sbClient = supabase.createClient(SB_URL, SB_KEY);

        async function registerNow() {
            const nameInput = document.getElementById('name').value;
            const payInput = document.getElementById('pay').value;
            const btn = document.getElementById('btn');
            
            if(!nameInput || !payInput) {
                alert("กรุณากรอกข้อมูลให้ครบครับพี่แขก");
                return;
            }

            btn.innerText = "กำลังสร้างระบบ...";
            btn.disabled = true;

            const artistId = 'art-' + Math.random().toString(36).substr(2, 9);
            
            try {
                const { error } = await sbClient
                    .from('musicians')
                    .insert([{ id: artistId, display_name: nameInput, promptpay: payInput }]);

                if(error) throw error;

                // สร้างลิงก์แบบ Dynamic ไม่สนชื่อไฟล์
                const currentPath = window.location.pathname;
                const basePath = currentPath.substring(0, currentPath.lastIndexOf('/') + 1);
                const fullBase = window.location.origin + basePath;

                const requestUrl = fullBase + 'request.html?id=' + artistId;
                const dashUrl = fullBase + 'dashboard.html?id=' + artistId;

                // สั่งแสดงผลหน้า QR
                document.getElementById('qrcode-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(requestUrl)}`;
                document.getElementById('dash-link').href = dashUrl;
                
                document.getElementById('setup-form').style.display = 'none';
                document.getElementById('result-area').classList.remove('hidden');

            } catch (err) {
                console.error(err);
                alert("ติดปัญหา: " + err.message);
                btn.innerText = "ลองใหม่อีกครั้ง";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
