<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPad Dashboard - RQMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen p-6">
    <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
        <h1 class="text-4xl font-black text-emerald-500 tracking-tighter">SONG QUEUE 🎸</h1>
        <div class="flex gap-4 items-center w-full md:w-auto">
            <input type="text" id="venue-input" placeholder="ชื่อร้านที่เล่นวันนี้" 
                class="bg-slate-900 border border-slate-700 px-4 py-2 rounded-lg outline-none focus:border-emerald-500 flex-1">
            <button id="system-btn" onclick="toggleSystem()" 
                class="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-2 rounded-full font-bold transition-all shadow-lg min-w-[120px]">
                เปิดระบบ
            </button>
        </div>
    </div>

    <div id="queue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <p id="empty-msg" class="text-slate-500 italic col-span-full text-center py-20">ยังไม่มีคำขอเพลงในขณะนี้...</p>
    </div>

    <script>
        // --- ข้อมูล Supabase ของพี่แขก ---
        const SB_URL = "https://uswpewtkfccqncjlmeus.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzd3Bld3RrZmNjcW5jamxtZXVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjE1MzQsImV4cCI6MjA5MDQzNzUzNH0.qQPQMzI2J_87Pu6M9FRHEeLL2hk9rabpUK4yiYOrKBc";
        
        const sbClient = supabase.createClient(SB_URL, SB_KEY);
        const urlParams = new URLSearchParams(window.location.search);
        const artistId = urlParams.get('id');

        let isSystemOpen = false;

        // 1. โหลดสถานะเดิมจาก Supabase (ทำให้เปิดมาแล้วค่าไม่หาย)
        async function loadCurrentStatus() {
            if (!artistId) return;
            try {
                const { data, error } = await sbClient
                    .from('musicians')
                    .select('is_active, current_venue')
                    .eq('id', artistId)
                    .single();

                if (data) {
                    isSystemOpen = data.is_active;
                    document.getElementById('venue-input').value = data.current_venue || "";
                    updateButtonUI();
                }
            } catch (e) { console.error("Load status error:", e); }
        }

        // 2. สลับสถานะ เปิด/ปิด
        async function toggleSystem() {
            if (!artistId) return alert("ไม่พบรหัสศิลปิน!");
            
            const venue = document.getElementById('venue-input').value || "ร้านประจำ";
            const newStatus = !isSystemOpen;

            const { error } = await sbClient
                .from('musicians')
                .update({ is_active: newStatus, current_venue: venue })
                .eq('id', artistId);

            if (error) {
                alert("บันทึกไม่สำเร็จ: " + error.message);
            } else {
                isSystemOpen = newStatus;
                updateButtonUI();
            }
        }

        // 3. อัปเดตสีปุ่ม
        function updateButtonUI() {
            const btn = document.getElementById('system-btn');
            if (isSystemOpen) {
                btn.innerText = "ปิดระบบ";
                btn.className = "bg-red-600 hover:bg-red-500 text-white px-8 py-2 rounded-full font-bold transition-all shadow-lg shadow-red-900/20";
            } else {
                btn.innerText = "เปิดระบบ";
                btn.className = "bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-2 rounded-full font-bold transition-all shadow-lg shadow-emerald-900/20";
            }
        }

        // 4. ดักจับเพลงใหม่
        function subscribeRequests() {
            if (!artistId) return;

            // ดึงเพลงเก่า
            sbClient.from('requests').select('*').eq('musician_id', artistId).order('created_at', { ascending: false })
                .then(({ data }) => { if (data) data.forEach(req => renderNewRequest(req)); });

            // ดักเพลงใหม่แบบ Real-time
            sbClient.channel('db-changes').on('postgres_changes', 
                { event: 'INSERT', schema: 'public', table: 'requests', filter: `musician_id=eq.${artistId}` }, 
                payload => { renderNewRequest(payload.new); }
            ).subscribe();
        }

        function renderNewRequest(req) {
            const container = document.getElementById('queue-container');
            const emptyMsg = document.getElementById('empty-msg');
            if (emptyMsg) emptyMsg.remove();

            const card = document.createElement('div');
            card.className = "bg-slate-900 border-l-4 border-emerald-500 p-5 rounded-xl shadow-lg animate-in fade-in slide-in-from-left duration-500";
            card.innerHTML = `
                <p class="text-[10px] text-slate-500 mb-1 uppercase tracking-wider">จากคุณ: ${req.customer_name || 'ไม่ระบุชื่อ'}</p>
                <h3 class="text-xl font-bold text-white">${req.song_name}</h3>
                <p class="text-[10px] text-slate-400 mt-2">${new Date(req.created_at).toLocaleTimeString()}</p>
            `;
            container.prepend(card);
        }

        // เริ่มทำงาน
        if (artistId) {
            loadCurrentStatus();
            subscribeRequests();
        } else {
            document.body.innerHTML = "<div class='text-center p-20'>ไม่พบรหัสศิลปิน (Invalid ID)</div>";
        }
    </script>
</body>
</html>
