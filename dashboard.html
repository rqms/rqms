<script>
    // ... (ส่วนอื่นๆ เหมือนเดิม) ...

    function getLocation() {
        var listContainer = document.getElementById('venue-list');
        var input = document.getElementById('venue-input');
        listContainer.innerHTML = "<p class='text-[10px] text-emerald-500 animate-pulse'>กำลังค้นหาพิกัด...</p>";

        if (!navigator.geolocation) {
            alert("iPad ไม่รองรับ GPS");
            return;
        }

        navigator.geolocation.getCurrentPosition(function(pos) {
            var lat = pos.coords.latitude;
            var lon = pos.coords.longitude;
            
            // ดึงข้อมูลแบบละเอียดขึ้น
            var url = 'https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=' + lat + '&lon=' + lon + '&zoom=18&addressdetails=1';
            
            fetch(url)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                var addr = data.address;
                // 1. ลองหาชื่อร้าน/สถานที่ก่อน
                var names = [addr.amenity, addr.building, addr.shop, addr.tourism, addr.leisure, addr.restaurant, addr.bar].filter(Boolean);
                
                // 2. ถ้าไม่เจอชื่อร้าน ให้เอาชื่อ ถนน หรือ ตำบล มาสำรองไว้ (พี่จะได้ไม่ต้องพิมพ์ยาว)
                var backup = [addr.road, addr.suburb, addr.village].filter(Boolean);
                
                listContainer.innerHTML = ""; 

                if (names.length > 0) {
                    // ถ้าเจอชื่อร้าน ให้สร้างปุ่มให้เลือก
                    names.forEach(function(name) {
                        var pill = document.createElement('button');
                        pill.className = "bg-slate-800 text-[10px] px-3 py-2 rounded-full border border-slate-700 text-emerald-400 font-bold";
                        pill.innerText = name;
                        pill.onclick = function() { input.value = name; listContainer.innerHTML = ""; };
                        listContainer.appendChild(pill);
                    });
                } else if (backup.length > 0) {
                    // ถ้าไม่เจอชื่อร้านเลย เอาชื่อถนน/พื้นที่มาใส่ในช่องพิมพ์ให้เลย
                    input.value = backup[0]; 
                    listContainer.innerHTML = "<p class='text-[10px] text-slate-500'>หาชื่อร้านไม่เจอ ดึงชื่อถนน/พื้นที่มาให้แทนแล้วครับ</p>";
                } else {
                    listContainer.innerHTML = "<p class='text-[10px] text-red-400'>ไม่พบข้อมูลจริงๆ ครับ รบกวนพิมพ์เองนะพี่</p>";
                }
            })
            .catch(function(err) {
                alert("เชื่อมต่อแผนที่ไม่ได้: " + err);
                listContainer.innerHTML = "";
            });
        }, function(error) {
            alert("GPS ขัดข้อง: " + error.message);
            listContainer.innerHTML = "";
        }, { enableHighAccuracy: true, timeout: 5000 });
    }

    // ... (ส่วนที่เหลือเหมือนเดิม) ...
</script>
