<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPad Dashboard - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .is-history { opacity: 0.4; filter: grayscale(1); transform: scale(0.95); border-left-color: #475569 !important; pointer-events: none; }
        .request-card { transition: all 0.2s ease; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen p-4 md:p-6 font-sans">

    <div class="mb-6 p-4 rounded-2xl bg-slate-900 border border-slate-800 flex flex-wrap justify-between items-center gap-4 shadow-2xl">
        <div class="flex items-center gap-4">
            <div id="status-dot" class="w-4 h-4 rounded-full bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)]"></div>
            <div>
                <p class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold">Status</p>
                <h2 id="status-text" class="text-xl font-black text-white leading-none uppercase">Offline</h2>
            </div>
        </div>
        <div class="border-l border-slate-800 pl-4">
            <p class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold">Musician / Band</p>
            <h2 id="display-artist-name" class="text-xl font-black text-emerald-500 leading-none">---</h2>
        </div>
        <div class="border-l border-slate-800 pl-4 pr-4">
            <p class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold">At Venue</p>
            <h2 id="display-venue" class="text-xl font-black text-white leading-none">---</h2>
        </div>
        <div class="text-right ml-auto">
            <h2 id="display-time" class="text-3xl font-mono font-black text-emerald-500 leading-none tracking-tighter">00:00:00</h2>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-10">
        <div class="md:col-span-3 flex flex-col gap-2">
            <div class="flex gap-2">
                <input type="text" id="venue-input" placeholder="ชื่อร้าน..." class="bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none focus:border-emerald-500 flex-1 text-lg font-bold text-white">
                <button onclick="getLocation()" class="bg-slate-800 hover:bg-slate-700 px-6 rounded-xl border border-slate-600 text-2xl">📍</button>
            </div>
            <div id="venue-list" class="flex flex-wrap gap-1"></div>
        </div>
        <button id="system-btn" onclick="toggleSystem()" class="bg-emerald-600 text-white px-8 py-4 rounded-xl font-black text-2xl uppercase shadow-lg h-full active:scale-95 transition-all">เปิดระบบ</button>
    </div>

    <div class="mb-10">
        <h3 class="text-emerald-500 font-bold uppercase tracking-[0.3em] text-[10px] mb-4 px-2 italic">🔥 New Requests (ใหม่สุดอยู่บน)</h3>
        <div id="queue-container" class="space-y-4 min-h-[100px]">
            </div>
    </div>

    <div class="border-t border-slate-800 pt-10 pb-20">
        <h3 class="text-slate-500 font-bold uppercase tracking-[0.3em] text-[10px] mb-4 px-2 italic">💾 History (คืนนี้จัดการแล้ว)</h3>
        <div id="history-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            </div>
    </div>

    <script>
        const SB_URL = "https://uswpewtkfccqncjlmeus.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzd3Bld3RrZmNjcW5jamxtZXVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjE1MzQsImV4cCI6MjA5MDQzNzUzNH0.qQPQMzI2J_87Pu6M9FRHEeLL2hk9rabpUK4yiYOrKBc";
        const sbClient = supabase.createClient(SB_URL, SB_KEY);
        const artistId = new URLSearchParams(window.location.search).get('id');
        let isSystemOpen = false;

        function updateClock() {
            document.getElementById('display-time').innerText = new Date().toLocaleTimeString('th-TH', { hour12: false });
        }
        setInterval(updateClock, 1000);

        async function init() {
            if (!artistId) return;
            // 1. โหลดข้อมูลวง
            const { data: musician } = await sbClient.from('musicians').select('*').eq('id', artistId).single();
            if (musician) {
                isSystemOpen = musician.is_active;
                document.getElementById('venue-input').value = musician.current_venue || "";
                document.getElementById('display-artist-name').innerText = musician.display_name || musician.name || "ศิลปิน";
                updateUI(musician.current_venue);
            }
            // 2. โหลดเพลงที่ค้างอยู่ในระบบ (แก้ปัญหารีเฟรชแล้วหาย)
            const { data: requests } = await sbClient.from('requests').select('*').eq('musician_id', artistId).order('created_at', { ascending: false });
            if (requests) {
                const container = document.getElementById('queue-container');
                container.innerHTML = "";
                requests.forEach(req => renderNewRequest(req));
            }
        }

        async function toggleSystem() {
            const venue = document.getElementById('venue-input').value || "ร้านประจำ";
            const newStatus = !isSystemOpen;
            if (!newStatus) {
                document.getElementById('queue-container').innerHTML = "";
                document.getElementById('history-container').innerHTML = "";
            }
            const { error } = await sbClient.from('musicians').update({ is_active: newStatus, current_venue: venue }).eq('id', artistId);
            if (!error) { isSystemOpen = newStatus; updateUI(venue); }
        }

        function updateUI(venue) {
            const btn = document.getElementById('system-btn');
            const dot = document.getElementById('status-dot');
            const statusTxt = document.getElementById('status-text');
            document.getElementById('display-venue').innerText = venue || "---";
            if (isSystemOpen) {
                btn.innerText = "ปิดระบบ"; btn.className = "bg-red-600 text-white px-8 py-4 rounded-xl font-black text-2xl shadow-lg w-full transition-all";
                dot.className = "w-4 h-4 rounded-full bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.5)]";
                statusTxt.innerText = "Online";
            } else {
                btn.innerText = "เปิดระบบ"; btn.className = "bg-emerald-600 text-white px-8 py-4 rounded-xl font-black text-2xl shadow-lg w-full transition-all";
                dot.className = "w-4 h-4 rounded-full bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)] animate-pulse";
                statusTxt.innerText = "Offline";
            }
        }

        // --- แก้ไข: ย้ายเพลงทันที ไม่ต้องรอ Database ---
        function handleAction(reqId, status) {
            const card = document.getElementById(`req-${reqId}`);
            if (!card) return;

            const histBox = document.getElementById('history-container');
            
            // 1. ลบปุ่มกดทิ้งทันที
            const btns = card.querySelector('.btns-group');
            if(btns) btns.remove();
            
            // 2. ใส่ป้ายสถานะ
            const tag = document.createElement('div');
            tag.className = status === 'yes' ? "text-emerald-500 font-black text-xs" : "text-red-500 font-black text-xs";
            tag.innerText = status === 'yes' ? "PLAYED ✅" : "DECLINED ❌";
            card.appendChild(tag);
            
            // 3. ย้ายที่อยู่ลงข้างล่าง
            card.classList.add('is-history');
            histBox.prepend(card);
            
            // 4. สั่งลบใน Database (ทำงานเบื้องหลัง)
            sbClient.from('requests').delete().eq('id', reqId).then();
        }

        function renderNewRequest(req) {
            const container = document.getElementById('queue-container');
            const card = document.createElement('div');
            card.id = `req-${req.id}`;
            card.className = "request-card bg-slate-900 border-l-4 border-emerald-500 p-5 rounded-xl shadow-lg flex justify-between items-center";
            card.innerHTML = `
                <div>
                    <p class="text-[9px] text-slate-500 uppercase font-bold mb-1">REQ: ${req.customer_name || 'ไม่ระบุ'}</p>
                    <h3 class="text-lg font-black text-white leading-tight">${req.song_name}</h3>
                </div>
                <div class="btns-group flex gap-2">
                    <button onclick="handleAction(${req.id}, 'yes')" class="bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold text-xs active:scale-90">เล่นได้</button>
                    <button onclick="handleAction(${req.id}, 'no')" class="bg-red-600 text-white px-4 py-2 rounded-lg font-bold text-xs active:scale-90">ไม่ได้</button>
                </div>
            `;
            container.prepend(card);
        }

        function subscribeRequests() {
            if (!artistId) return;
            sbClient.channel('custom-insert-channel').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'requests', filter: `musician_id=eq.${artistId}` }, 
                payload => renderNewRequest(payload.new)).subscribe();
        }

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&zoom=18`);
                    const data = await res.json();
                    const addr = data.address;
                    const suggs = [addr.amenity, addr.building, addr.shop, addr.tourism].filter(Boolean);
                    const container = document.getElementById('venue-list');
                    container.innerHTML = "";
                    suggs.forEach(name => {
                        const pill = document.createElement('button');
                        pill.className = "bg-slate-800 text-[10px] px-2 py-1 rounded-full border border-slate-700 text-slate-400";
                        pill.innerText = name;
                        pill.onclick = () => { document.getElementById('venue-input').value = name; container.innerHTML = ""; };
                        container.appendChild(pill);
                    });
                });
            }
        }

        init();
        subscribeRequests();
        updateClock();
    </script>
</body>
</html>
