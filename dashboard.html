<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RQMS Dashboard - Secured</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .is-history { opacity: 0.4 !important; filter: grayscale(1); transform: scale(0.9); border-left-color: #475569 !important; pointer-events: none; }
        .request-card { transition: all 0.2s ease; margin-bottom: 12px; }
        .big-btn:active { background-color: #000 !important; opacity: 0.7; transform: scale(0.95); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen p-4 font-sans">

    <div id="lock-screen" class="fixed inset-0 z-[200] bg-[#020617] flex items-center justify-center p-6 hidden">
        <div class="max-w-sm w-full text-center space-y-8">
            <h1 class="text-4xl font-black text-emerald-400">RQMS 🎸</h1>
            <p class="text-slate-400 text-sm">กรอก PIN 6 หลักเพื่อเข้าควบคุมระบบ</p>
            <input type="password" id="pin-input" maxlength="6" inputmode="numeric" 
                   class="w-full bg-slate-900 border-2 border-slate-700 p-4 rounded-2xl text-center text-3xl tracking-[0.5em] text-white outline-none focus:border-emerald-500">
            <button onclick="checkPin()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">
                ยืนยันรหัสผ่าน
            </button>
            <p id="pin-error" class="text-red-500 text-sm hidden">❌ รหัสผ่านไม่ถูกต้องครับพี่</p>
        </div>
    </div>

    <div id="main-content">
        <div class="mb-6 p-4 rounded-2xl bg-slate-900 border border-slate-800 flex justify-between items-center shadow-2xl">
            <div class="flex items-center gap-4">
                <div id="status-dot" class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_red]"></div>
                <div>
                    <p class="text-[8px] uppercase text-slate-500 font-bold">Status</p>
                    <h2 id="status-text" class="text-lg font-black text-white uppercase leading-none">Offline</h2>
                </div>
            </div>
            <div class="border-l border-slate-800 pl-4 flex items-center gap-3 text-right">
                <div>
                    <p class="text-[8px] uppercase text-slate-500 font-bold">Artist</p>
                    <h2 id="display-artist-name" class="text-lg font-black text-emerald-500 leading-none">---</h2>
                </div>
                <button onclick="openEditModal()" class="bg-slate-800 p-2 rounded-lg border border-slate-700 text-sm hover:bg-slate-700">⚙️</button>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-2 mb-8 text-right">
            <h2 id="display-time" class="text-4xl font-mono font-black text-emerald-500 mb-2">00:00:00</h2>
            <div class="flex gap-2">
                <input type="text" id="venue-input" placeholder="พิมพ์ชื่อร้าน..." class="bg-slate-900 border border-slate-700 p-4 rounded-xl flex-1 text-white font-bold text-lg outline-none focus:border-emerald-500">
                <button onclick="getLocation()" class="bg-slate-800 px-6 rounded-xl border border-slate-600 text-2xl big-btn">📍</button>
            </div>
            <div id="venue-list" class="flex flex-wrap gap-2 min-h-[10px]"></div>
            <button id="system-btn" onclick="toggleSystem()" class="bg-emerald-600 text-white py-4 rounded-xl font-black uppercase shadow-lg big-btn text-xl">เปิดระบบ</button>
        </div>

        <div class="mb-10">
            <h3 class="text-emerald-400 font-bold text-[10px] mb-4 italic px-2 tracking-[0.3em]">🔥 LIVE REQUESTS</h3>
            <div id="queue-container"></div>
        </div>

        <div class="border-t border-slate-800 pt-10 pb-20">
            <h3 class="text-slate-500 font-bold text-[10px] mb-4 italic px-2 tracking-[0.3em]">💾 HISTORY (STATS)</h3>
            <div id="history-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <button onclick="logout()" class="text-slate-600 text-[10px] uppercase font-bold w-full py-8 hover:text-red-400">🚪 ออกจากระบบ (Logout)</button>
    </div>

    <div id="editProfileModal" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-lg rounded-3xl p-6 shadow-2xl">
            <h2 class="text-xl font-black text-white uppercase mb-6">Settings</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-slate-500 font-bold mb-1 block">ชื่อศิลปิน/วง</label>
                    <input type="text" id="edit_display_name" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-white outline-none">
                </div>
                <div>
                    <label class="text-[10px] text-emerald-500 font-bold mb-1 block">💸 พร้อมเพย์รับทิป (เบอร์โทร/เลขบัตร)</label>
                    <input type="text" id="edit_promptpay" placeholder="เช่น 0812345678" class="w-full bg-slate-950 border border-emerald-900 p-3 rounded-xl text-white outline-none focus:border-emerald-500 font-bold text-lg">
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 font-bold mb-1 block">แนวเพลง</label>
                    <input type="text" id="edit_genres" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-white outline-none">
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 font-bold mb-1 block">เพลงแนะนำ</label>
                    <textarea id="edit_songs" rows="3" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-white outline-none"></textarea>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 mt-8">
                <button onclick="saveProfile()" class="bg-emerald-600 text-white py-4 rounded-2xl font-black uppercase">บันทึก</button>
                <button onclick="document.getElementById('editProfileModal').classList.add('hidden')" class="bg-slate-800 text-slate-400 py-4 rounded-2xl font-black uppercase">ยกเลิก</button>
            </div>
        </div>
    </div>

    <script>
        var SB_URL = "https://uswpewtkfccqncjlmeus.supabase.co"; 
        var SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzd3Bld3RrZmNjcW5jamxtZXVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjE1MzQsImV4cCI6MjA5MDQzNzUzNH0.qQPQMzI2J_87Pu6M9FRHEeLL2hk9rabpUK4yiYOrKBc";
        var sb = supabase.createClient(SB_URL, SB_KEY);
        var artistId = new URLSearchParams(window.location.search).get('id');
        var isSystemOpen = false;
        var masterPin = ""; // เก็บ PIN จาก DB ไว้เช็ค

        // --- 🔒 ระบบตรวจสอบความปลอดภัย ---
        async function initAuth() {
            if (!artistId) return alert("ไม่พบ ID ศิลปิน");
            
            const { data } = await sb.from('musicians').select('pin, display_name').eq('id', artistId).single();
            if (data) {
                masterPin = data.pin;
                // เช็คว่าเครื่องนี้เคย Login ไว้หรือยัง
                const savedAccess = localStorage.getItem('access_' + artistId);
                if (savedAccess === 'true') {
                    document.getElementById('lock-screen').classList.add('hidden');
                    load();
                } else {
                    document.getElementById('lock-screen').classList.remove('hidden');
                }
            }
        }

        function checkPin() {
            const input = document.getElementById('pin-input').value;
            if (input === masterPin) {
                localStorage.setItem('access_' + artistId, 'true');
                document.getElementById('lock-screen').classList.add('hidden');
                load();
            } else {
                document.getElementById('pin-error').classList.remove('hidden');
                document.getElementById('pin-input').value = "";
            }
        }

        function logout() {
            if(confirm("ต้องการออกจากระบบและให้ถามรหัสผ่านใหม่ใช่ไหมครับ?")) {
                localStorage.removeItem('access_' + artistId);
                location.reload();
            }
        }

        // --- ระบบเดิมที่คงไว้ ---
        setInterval(function() {
            document.getElementById('display-time').innerText = new Date().toLocaleTimeString('th-TH', { hour12: false });
        }, 1000);

        async function load() {
            var resMusician = await sb.from('musicians').select('*').eq('id', artistId).single();
            if (resMusician.data) {
                isSystemOpen = resMusician.data.is_active;
                document.getElementById('venue-input').value = resMusician.data.current_venue || "";
                document.getElementById('display-artist-name').innerText = resMusician.data.display_name;
                updateUI(resMusician.data.current_venue);
            }
            var resReq = await sb.from('requests').select('*').eq('musician_id', artistId).eq('status', 'pending');
            if (resReq.data) { resReq.data.forEach(function(r) { draw(r); }); }
        }

        sb.channel('db').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'requests', filter: 'musician_id=eq.'+artistId }, 
            function(p) { draw(p.new); }).subscribe();

        // (คงฟังก์ชัน getLocation, toggleSystem, draw, solve, updateUI เหมือนเดิม)
        function getLocation() { /* โค้ดเดิมของพี่ */ } 
        // [เนื่องจากโค้ดเดิมยาว ผมขอย่อไว้ แต่พี่ใช้โค้ดเดิมที่พี่มีได้เลยครับ]
        
        async function openEditModal() {
            const { data } = await sb.from('musicians').select('*').eq('id', artistId).single();
            if (data) {
                document.getElementById('edit_display_name').value = data.display_name || "";
                document.getElementById('edit_genres').value = data.genres || "";
                document.getElementById('edit_promptpay').value = data.promptpay || ""; // ดึงพร้อมเพย์
                document.getElementById('edit_songs').value = data.recommended_songs || "";
                document.getElementById('editProfileModal').classList.remove('hidden');
            }
        }

        async function saveProfile() {
            const updates = {
                display_name: document.getElementById('edit_display_name').value,
                genres: document.getElementById('edit_genres').value,
                promptpay: document.getElementById('edit_promptpay').value, // บันทึกพร้อมเพย์
                recommended_songs: document.getElementById('edit_songs').value
            };
            const { error } = await sb.from('musicians').update(updates).eq('id', artistId);
            if (!error) {
                alert("บันทึกข้อมูลเรียบร้อย!");
                document.getElementById('display-artist-name').innerText = updates.display_name;
                document.getElementById('editProfileModal').classList.add('hidden');
            }
        }

        // เริ่มระบบความปลอดภัย
        initAuth();
    </script>
    
    <script>
        // ก๊อปปี้ฟังก์ชันที่เหลือมาวางตรงนี้เพื่อให้ทำงานได้
        async function toggleSystem() {
            var v = document.getElementById('venue-input').value || "ร้านประจำ";
            var next = !isSystemOpen;
            if(!next) { document.getElementById('queue-container').innerHTML = ""; document.getElementById('history-container').innerHTML = ""; }
            await sb.from('musicians').update({ is_active: next, current_venue: v }).eq('id', artistId);
            isSystemOpen = next; updateUI(v);
        }

        function updateUI(v) {
            var b = document.getElementById('system-btn');
            var d = document.getElementById('status-dot');
            var s = document.getElementById('status-text');
            if (isSystemOpen) {
                b.innerText = "ปิดระบบ"; b.className = "bg-red-600 text-white py-4 rounded-xl font-black w-full shadow-lg big-btn text-xl";
                d.className = "w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]";
                s.innerText = "Online";
            } else {
                b.innerText = "เปิดระบบ"; b.className = "bg-emerald-600 text-white py-4 rounded-xl font-black w-full shadow-lg big-btn text-xl";
                d.className = "w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_red]";
                s.innerText = "Offline";
            }
        }

        function draw(req) {
            if (document.getElementById('card-' + req.id)) return;
            var container = document.getElementById('queue-container');
            var div = document.createElement('div');
            div.id = 'card-' + req.id;
            div.className = "request-card bg-slate-900 border-l-4 border-emerald-500 p-5 rounded-xl flex justify-between items-center shadow-lg";
            div.innerHTML = '<div><p class="text-[9px] text-slate-500 font-bold mb-1">จาก: ' + (req.customer_name || "ไม่ระบุ") + '</p><h3 class="text-lg font-black text-white leading-tight">' + req.song_name + '</h3></div>' +
                '<div class="btn-area flex gap-2"><button onclick="solve(\'' + req.id + '\', \'ok\')" class="bg-emerald-600 text-white px-5 py-3 rounded-xl font-black text-xs big-btn">เล่นได้</button>' +
                '<button onclick="solve(\'' + req.id + '\', \'no\')" class="bg-red-600 text-white px-5 py-3 rounded-xl font-black text-xs big-btn">ไม่ได้</button></div>';
            container.prepend(div);
        }

        function solve(id, status) {
            var card = document.getElementById('card-' + id);
            if (card) {
                card.querySelector('.btn-area').remove();
                var label = document.createElement('div');
                label.className = (status === 'ok' ? "text-emerald-500" : "text-red-500") + " font-black text-[10px] mt-1";
                label.innerText = (status === 'ok' ? "PLAYED ✅" : "DECLINED ❌");
                card.appendChild(label);
                card.classList.add('is-history');
                document.getElementById('history-container').prepend(card);
                sb.from('requests').update({ status: (status === 'ok' ? 'played' : 'declined') }).eq('id', id).then(function(){});
            }
        }
        // พี่ก๊อปฟังก์ชัน getLocation เดิมของพี่มาใส่ตรงนี้ได้เลยนะครับ!
    </script>
</body>
</html>
