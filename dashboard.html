<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPad Dashboard - RQMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen p-4 md:p-6">
    
    <div id="status-bar" class="mb-6 p-4 rounded-2xl bg-slate-900 border border-slate-800 flex flex-wrap justify-between items-center gap-4 shadow-2xl">
        <div class="flex items-center gap-4">
            <div id="status-dot" class="w-4 h-4 rounded-full bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)] animate-pulse"></div>
            <div>
                <p class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold">Status</p>
                <h2 id="status-text" class="text-xl font-black text-white">ระบบปิดอยู่</h2>
            </div>
        </div>
        <div class="border-l border-slate-800 pl-4">
            <p class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold">Musician / Band</p>
            <h2 id="display-artist-name" class="text-xl font-black text-emerald-500">---</h2>
        </div>
        <div class="border-l border-slate-800 pl-4">
            <p class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold">Current Venue</p>
            <h2 id="display-venue" class="text-xl font-black text-white">ไม่ได้ระบุร้าน</h2>
        </div>
        <div class="text-right ml-auto">
            <p id="display-date" class="text-[10px] text-slate-500 font-bold tracking-widest uppercase"></p>
            <h2 id="display-time" class="text-3xl font-mono font-black text-emerald-500 leading-none">00:00:00</h2>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
        <div class="md:col-span-2 flex flex-col gap-2">
            <div class="flex gap-2">
                <input type="text" id="venue-input" placeholder="พิมพ์ชื่อร้าน หรือกด 📍" 
                    class="bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none focus:border-emerald-500 flex-1 text-lg font-bold">
                <button onclick="getLocation()" class="bg-slate-800 hover:bg-slate-700 px-6 rounded-xl border border-slate-600 text-2xl shadow-sm transition-all">📍</button>
            </div>
            <div id="venue-list" class="flex flex-wrap gap-2"></div>
        </div>
        <button id="system-btn" onclick="toggleSystem()" 
            class="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-4 rounded-xl font-black text-2xl transition-all shadow-lg shadow-emerald-900/20 h-full uppercase tracking-tighter">
            เปิดระบบ
        </button>
    </div>

    <h3 class="text-slate-500 font-bold uppercase tracking-[0.3em] text-xs mb-4 px-2">Live Queue</h3>
    <div id="queue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <p id="empty-msg" class="text-slate-600 italic col-span-full text-center py-20 bg-slate-900/30 rounded-3xl border border-dashed border-slate-800">ยังไม่มีคำขอเพลงในขณะนี้...</p>
    </div>

    <script>
        const SB_URL = "https://uswpewtkfccqncjlmeus.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzd3Bld3RrZmNjcW5jamxtZXVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjE1MzQsImV4cCI6MjA5MDQzNzUzNH0.qQPQMzI2J_87Pu6M9FRHEeLL2hk9rabpUK4yiYOrKBc";
        const sbClient = supabase.createClient(SB_URL, SB_KEY);
        const urlParams = new URLSearchParams(window.location.search);
        const artistId = urlParams.get('id');
        let isSystemOpen = false;

        // --- ระบบเวลา Real-time ---
        function updateClock() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('display-date').innerText = now.toLocaleDateString('th-TH', options);
            document.getElementById('display-time').innerText = now.toLocaleTimeString('th-TH', { hour12: false });
        }
        setInterval(updateClock, 1000);

        // --- ระบบ GPS ---
        function getLocation() {
            if (navigator.geolocation) {
                const btn = event.currentTarget; btn.innerText = "⏳";
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&zoom=18`);
                        const data = await res.json();
                        const addr = data.address;
                        const suggs = [addr.amenity, addr.building, addr.shop, addr.tourism, addr.office].filter(Boolean);
                        renderVenueOptions(suggs);
                    } catch (e) { console.error(e); }
                    btn.innerText = "📍";
                }, () => { alert("กรุณาเปิด GPS ครับ"); btn.innerText = "📍"; });
            }
        }

        function renderVenueOptions(opts) {
            const container = document.getElementById('venue-list');
            container.innerHTML = "";
            opts.forEach(name => {
                const pill = document.createElement('button');
                pill.className = "bg-slate-800 hover:bg-emerald-600 text-xs px-3 py-1 rounded-full border border-slate-700 transition-all text-slate-300";
                pill.innerText = name;
                pill.onclick = () => { document.getElementById('venue-input').value = name; container.innerHTML = ""; };
                container.appendChild(pill);
            });
        }

        // --- โหลดสถานะและดึงข้อมูล ---
        async function loadCurrentStatus() {
            if (!artistId) return;
            const { data } = await sbClient.from('musicians').select('*').eq('id', artistId).single();
            if (data) {
                isSystemOpen = data.is_active;
                document.getElementById('venue-input').value = data.current_venue || "";
                document.getElementById('display-artist-name').innerText = data.name || "ศิลปินอิสระ";
                updateUI(data.current_venue);
            }
        }

        async function toggleSystem() {
            const venue = document.getElementById('venue-input').value || "ร้านประจำ";
            const newStatus = !isSystemOpen;
            const { error } = await sbClient.from('musicians').update({ is_active: newStatus, current_venue: venue }).eq('id', artistId);
            if (!error) { isSystemOpen = newStatus; updateUI(venue); }
        }

        function updateUI(venue) {
            const btn = document.getElementById('system-btn');
            const dot = document.getElementById('status-dot');
            const statusTxt = document.getElementById('status-text');
            const venueDisp = document.getElementById('display-venue');

            venueDisp.innerText = venue || "ไม่ได้ระบุร้าน";
            
            if (isSystemOpen) {
                btn.innerText = "ปิดระบบ";
                btn.className = "bg-red-600 hover:bg-red-500 text-white px-8 py-4 rounded-xl font-black text-2xl transition-all shadow-lg w-full mt-2";
                dot.className = "w-4 h-4 rounded-full bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.5)]";
                statusTxt.innerText = "ระบบกำลังเปิด";
            } else {
                btn.innerText = "เปิดระบบ";
                btn.className = "bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-4 rounded-xl font-black text-2xl transition-all shadow-lg w-full mt-2";
                dot.className = "w-4 h-4 rounded-full bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)] animate-pulse";
                statusTxt.innerText = "ระบบปิดอยู่";
            }
        }

        function subscribeRequests() {
            if (!artistId) return;
            sbClient.from('requests').select('*').eq('musician_id', artistId).order('created_at', { ascending: false })
                .then(({ data }) => { if (data) data.forEach(req => renderNewRequest(req)); });
            sbClient.channel('db-changes').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'requests', filter: `musician_id=eq.${artistId}` }, 
                payload => renderNewRequest(payload.new)).subscribe();
        }

        function renderNewRequest(req) {
            const container = document.getElementById('queue-container');
            const emptyMsg = document.getElementById('empty-msg');
            if (emptyMsg) emptyMsg.remove();
            const card = document.createElement('div');
            card.className = "bg-slate-900 border-l-4 border-emerald-500 p-5 rounded-xl shadow-lg";
            card.innerHTML = `<p class="text-[10px] text-slate-500 mb-1 uppercase tracking-widest">จากคุณ: ${req.customer_name || 'ไม่ระบุ'}</p>
                              <h3 class="text-xl font-bold text-white leading-tight">${req.song_name}</h3>
                              <p class="text-[10px] text-slate-400 mt-2 font-mono">${new Date(req.created_at).toLocaleTimeString()}</p>`;
            container.prepend(card);
        }

        if (artistId) { loadCurrentStatus(); subscribeRequests(); updateClock(); }
    </script>
</body>
</html>
