<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPad Dashboard - RQMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen p-6">
    <div class="flex justify-between items-center mb-10">
        <h1 class="text-4xl font-black text-emerald-500 tracking-tighter">SONG QUEUE</h1>
        <div class="flex gap-4 items-center">
            <input type="text" id="venue-input" placeholder="ชื่อร้านที่เล่นวันนี้" class="bg-slate-900 border border-slate-700 px-4 py-2 rounded-lg outline-none focus:border-emerald-500">
            <button id="system-btn" onclick="toggleSystem()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded-full font-bold transition-all shadow-lg shadow-emerald-900/20">
                เปิดระบบ
            </button>
        </div>
    </div>

    <div id="queue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <p id="empty-msg" class="text-slate-500 italic col-span-full text-center py-20">ยังไม่มีคำขอเพลงในขณะนี้...</p>
    </div>

    <script>
        // --- ใส่ URL และ KEY ของพี่ตรงนี้ ---
        const SB_URL = "URL_ของพี่"; 
        const SB_KEY = "KEY_ของพี่";
        // ---------------------------------

        const sbClient = supabase.createClient(SB_URL, SB_KEY);
        const urlParams = new URLSearchParams(window.location.search);
        const artistId = urlParams.get('id');

        let isSystemOpen = false;

        async function toggleSystem() {
            if (!artistId) return alert("ไม่พบรหัสศิลปิน!");
            
            const venue = document.getElementById('venue-input').value || "ร้านประจำ";
            isSystemOpen = !isSystemOpen;

            const { error } = await sbClient
                .from('musicians')
                .update({ is_active: isSystemOpen, current_venue: venue })
                .eq('id', artistId);

            if (error) {
                alert("เกิดข้อผิดพลาด: " + error.message);
            } else {
                updateButtonUI();
            }
        }

        function updateButtonUI() {
            const btn = document.getElementById('system-btn');
            if (isSystemOpen) {
                btn.innerText = "ปิดระบบ";
                btn.className = "bg-red-600 hover:bg-red-500 text-white px-6 py-2 rounded-full font-bold transition-all";
            } else {
                btn.innerText = "เปิดระบบ";
                btn.className = "bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded-full font-bold transition-all";
            }
        }

        // ฟังก์ชันดึงข้อมูลเพลงแบบ Real-time
        function subscribeRequests() {
            sbClient
                .channel('public:requests')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'requests', filter: `musician_id=eq.${artistId}` }, payload => {
                    renderNewRequest(payload.new);
                })
                .subscribe();
        }

        function renderNewRequest(req) {
            const container = document.getElementById('queue-container');
            const emptyMsg = document.getElementById('empty-msg');
            if (emptyMsg) emptyMsg.remove();

            const card = document.createElement('div');
            card.className = "bg-slate-900 border-l-4 border-emerald-500 p-5 rounded-xl shadow-lg animate-bounce-short";
            card.innerHTML = `
                <p class="text-xs text-slate-500 mb-1">จากคุณ: ${req.customer_name || 'ผู้ไม่ประสงค์ออกนาม'}</p>
                <h3 class="text-xl font-bold text-white">${req.song_name}</h3>
                <p class="text-xs text-slate-400 mt-2">${new Date(req.created_at).toLocaleTimeString()}</p>
            `;
            container.prepend(card);
        }

        if (artistId) subscribeRequests();
    </script>

    <style>
        @keyframes bounce-short {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .animate-bounce-short { animation: bounce-short 0.5s ease-in-out; }
    </style>
</body>
</html>
