<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPad Dashboard - RQMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-black text-white p-6">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-4xl font-black text-emerald-400">SONG QUEUE</h1>
        <div id="gig-status" class="flex items-center gap-4">
            <input type="text" id="venue" placeholder="ชื่อร้านที่เล่นวันนี้" class="bg-gray-900 border border-gray-700 p-2 rounded-lg text-sm">
            <button onclick="toggleGig(true)" id="btn-start" class="bg-green-600 px-6 py-2 rounded-full font-bold">เปิดระบบ</button>
            <button onclick="toggleGig(false)" id="btn-stop" class="hidden bg-red-600 px-6 py-2 rounded-full font-bold">ปิดระบบ</button>
        </div>
    </div>

    <div id="queue-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        </div>

    <script>
        const SB_URL = "https://uswpewtkfccqncjlmeus.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzd3Bld3RrZmNjcW5jamxtZXVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjE1MzQsImV4cCI6MjA5MDQzNzUzNH0.qQPQMzI2J_87Pu6M9FRHEeLL2hk9rabpUK4yiYOrKBc";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);
        const artistId = new URLSearchParams(window.location.search).get('id');

        async function toggleGig(status) {
            const venue = document.getElementById('venue').value;
            await supabase.from('musicians').update({ is_active: status, current_venue: venue }).eq('id', artistId);
            document.getElementById('btn-start').classList.toggle('hidden', status);
            document.getElementById('btn-stop').classList.toggle('hidden', !status);
        }

        async function fetchQueue() {
            const { data } = await supabase.from('requests').select('*').eq('musician_id', artistId).neq('status', 'done').order('created_at', { ascending: true });
            const list = document.getElementById('queue-list');
            list.innerHTML = data.map(q => `
                <div class="bg-[#1e293b] p-6 rounded-2xl border-l-8 ${q.status === 'playing' ? 'border-amber-500 bg-amber-900/20' : 'border-emerald-500'}">
                    <h3 class="text-2xl font-bold">${q.song_name}</h3>
                    <p class="text-slate-400 mt-2">ขอโดย: ${q.customer_name || 'ไม่ระบุชื่อ'}</p>
                    <div class="mt-4 flex gap-2">
                        <button onclick="updateStatus('${q.id}', 'playing')" class="bg-amber-600 px-4 py-2 rounded-lg text-xs font-bold uppercase">กำลังร้อง</button>
                        <button onclick="updateStatus('${q.id}', 'done')" class="bg-emerald-600 px-4 py-2 rounded-lg text-xs font-bold uppercase">เล่นเสร็จแล้ว</button>
                    </div>
                </div>
            `).join('');
        }

        async function updateStatus(id, status) {
            await supabase.from('requests').update({ status }).eq('id', id);
            fetchQueue();
        }

        // Real-time Update: ฟังความเปลี่ยนแปลงจาก Supabase
        supabase.channel('custom-all-channel')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'requests' }, () => {
            fetchQueue();
            const audio = new Audio('https://www.soundjay.com/buttons/beep-07a.mp3');
            audio.play(); // เสียงเตือนเพลงเข้า
          }).subscribe();

        fetchQueue();
    </script>
</body>
</html>
