<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RQMS Dashboard - Universal Chord Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .is-history { opacity: 0.4 !important; filter: grayscale(1); transform: scale(0.9); border-left-color: #475569 !important; pointer-events: none; }
        .request-card { transition: all 0.2s ease; margin-bottom: 12px; }
        .big-btn:active { background-color: #000 !important; opacity: 0.7; transform: scale(0.95); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        #artist-profile-img { transition: all 0.3s ease; }
        .search-result-item { transition: all 0.2; cursor: pointer; }
        .search-result-item:hover { background-color: #1e293b; }
        .song-tag { display: inline-flex; align-items: center; gap: 4px; background: #10b98120; border: 1px solid #10b98140; color: #10b981; padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: bold; margin: 2px; }
        
        body, html { height: 100%; overflow: hidden; background: #020617; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-200 font-sans">

    <div id="lock-screen" class="fixed inset-0 z-[200] bg-[#020617] flex items-center justify-center p-6 hidden">
        <div class="max-w-sm w-full text-center space-y-8">
            <h1 class="text-4xl font-black text-emerald-400">RQMS 🎸</h1>
            <p class="text-slate-400 text-sm">กรอก PIN 6 หลักเพื่อเข้าควบคุมระบบ</p>
            <input type="password" id="pin-input" maxlength="6" inputmode="numeric" 
                   class="w-full bg-slate-900 border-2 border-slate-700 p-4 rounded-2xl text-center text-3xl tracking-[0.5em] text-white outline-none focus:border-emerald-500">
            <button onclick="checkPin()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">ยืนยันรหัสผ่าน</button>
            <p id="pin-error" class="text-red-500 text-sm hidden font-bold">❌ รหัสผ่านไม่ถูกต้องครับ</p>
        </div>
    </div>

    <div class="flex h-screen w-full overflow-hidden">
        
        <div id="main-content" class="w-full lg:w-[400px] border-r border-slate-800 flex flex-col p-4 overflow-y-auto custom-scrollbar bg-slate-950">
            <div class="mb-6 p-4 rounded-2xl bg-slate-900 border border-slate-800 flex justify-between items-center shadow-2xl">
                <div class="flex items-center gap-3">
                    <div id="status-dot" class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_red]"></div>
                    <div>
                        <p class="text-[8px] uppercase text-slate-500 font-bold leading-none mb-1">Status</p>
                        <h2 id="status-text" class="text-sm font-black text-white uppercase leading-none">Offline</h2>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <img id="artist-profile-img" src="" class="w-8 h-8 rounded-full border border-emerald-500 object-cover bg-slate-800">
                    <div class="text-right">
                        <h2 id="display-artist-name" class="text-sm font-black text-emerald-500 leading-none">---</h2>
                    </div>
                    <button onclick="openEditModal()" class="bg-slate-800 p-1.5 rounded-lg border border-slate-700 text-xs">⚙️</button>
                </div>
                <div class="text-right ml-2 border-l border-slate-800 pl-2">
                    <h2 id="display-time" class="text-lg font-mono font-black text-emerald-500 leading-none">00:00</h2>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-2 mb-6">
                <div class="flex gap-2">
                    <input type="text" id="venue-input" placeholder="พิมพ์ชื่อร้าน..." class="bg-slate-900 border border-slate-700 p-3 rounded-xl flex-1 text-white font-bold text-sm outline-none focus:border-emerald-500">
                    <button onclick="getLocation()" class="bg-slate-800 px-4 rounded-xl border border-slate-600 big-btn">📍</button>
                </div>
                <div id="venue-list" class="flex flex-wrap gap-2 min-h-[5px]"></div>
                <button id="system-btn" onclick="toggleSystem()" class="bg-emerald-600 text-white py-3 rounded-xl font-black uppercase shadow-lg big-btn text-lg">เปิดระบบ</button>
            </div>

            <div class="mb-8">
                <h3 class="text-emerald-400 font-bold text-[10px] mb-4 italic px-2 tracking-[0.3em] uppercase">🔥 Live Requests</h3>
                <div id="queue-container"></div>
            </div>

            <div class="border-t border-slate-900 pt-6">
                <h3 class="text-slate-600 font-bold text-[10px] mb-4 italic px-2 tracking-[0.3em] uppercase">💾 History</h3>
                <div id="history-container"></div>
            </div>

            <button onclick="logout()" class="text-slate-700 text-[10px] uppercase font-bold w-full py-8 hover:text-red-500">🚪 ออกจากระบบ</button>
        </div>

        <div id="chord-viewer-panel" class="hidden lg:flex flex-1 flex-col bg-[#010409] relative">
            <div class="p-3 bg-slate-900 border-b border-slate-800 flex flex-wrap gap-2 justify-between items-center shadow-lg">
                <div class="flex items-center gap-2">
                    <span id="playing-song-label" class="text-emerald-500 font-black text-[10px] uppercase italic tracking-wider">Now Playing: ---</span>
                </div>
                
                <div class="flex gap-2 items-center">
                    <input type="text" id="drive-folder-input" placeholder="วางลิงก์ Google Drive..." 
                           class="bg-slate-950 border border-slate-700 px-3 py-2 rounded-xl text-[10px] text-white outline-none w-44 focus:border-blue-500">
                    
                    <button onclick="saveAndOpenDrive()" class="bg-blue-600 text-white px-3 py-2 rounded-xl text-[10px] font-black active:scale-95 shadow-lg">💾 บันทึก & เปิดโฟลเดอร์</button>
                    
                    <div class="h-6 w-[1px] bg-slate-700 mx-1"></div>

                    <input type="file" id="chord-file-input" accept="image/*" class="hidden" onchange="loadLocalChord(event)">
                    <label for="chord-file-input" class="bg-slate-800 text-slate-400 p-2 rounded-xl text-[10px] cursor-pointer" title="เปิดไฟล์ในเครื่อง">📁</label>
                    <button onclick="autoSearchChord()" class="bg-slate-800 text-emerald-500 p-2 rounded-xl text-[10px] font-bold" title="หาคอร์ดจาก Google">🔍</button>
                    <button onclick="resetViewer()" class="bg-slate-700 text-slate-400 px-2 py-2 rounded-xl text-[10px]">✕</button>
                </div>
            </div>

            <div id="chord-display-area" class="flex-1 overflow-hidden relative p-0 bg-black">
                <div id="img-container" class="hidden h-full overflow-auto custom-scrollbar">
                    <img id="main-chord-img" class="w-full h-auto mx-auto shadow-2xl">
                </div>

                <iframe id="main-chord-web" class="hidden w-full h-full bg-white border-none" src=""></iframe>

                <div id="chord-empty-msg" class="h-full flex flex-col items-center justify-center text-slate-800 text-center">
                    <p class="text-6xl mb-4 opacity-20">🎸</p>
                    <p class="font-bold text-xs uppercase tracking-[0.2em] opacity-40">เตรียมพร้อมเล่นดนตรี</p>
                </div>
            </div>

            <div id="scroll-controls" class="hidden absolute bottom-8 right-8 flex flex-col gap-2 items-center z-50">
                <div class="flex gap-2">
                    <button onclick="adjustSpeed(20)" class="bg-slate-800/90 backdrop-blur text-white px-4 py-2 rounded-full border border-slate-600 text-[10px] font-bold shadow-xl active:scale-90">🐢 ช้าลง</button>
                    <button onclick="adjustSpeed(-20)" class="bg-slate-800/90 backdrop-blur text-white px-4 py-2 rounded-full border border-slate-600 text-[10px] font-bold shadow-xl active:scale-90">🐇 เร็วขึ้น</button>
                </div>
                <button id="v-scroll-btn" onclick="toggleAutoScroll()" class="bg-amber-600 hover:bg-amber-500 text-white px-10 py-5 rounded-full font-black uppercase shadow-2xl text-xl active:scale-90 transition-all">
                    📜 เลื่อนหน้า
                </button>
            </div>
        </div>
    </div>

    <div id="editProfileModal" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-lg rounded-3xl p-6 shadow-2xl">
            <h2 class="text-xl font-black text-white uppercase mb-6">Settings</h2>
            <div class="space-y-4">
                <div><label class="text-[10px] text-slate-500 font-bold mb-1 block uppercase">ชื่อวง</label><input type="text" id="edit_display_name" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-white outline-none"></div>
                <div><label class="text-[10px] text-emerald-500 font-bold mb-1 block uppercase">💸 PromptPay</label><input type="text" id="edit_promptpay" class="w-full bg-slate-950 border border-emerald-900 p-3 rounded-xl text-white outline-none font-bold"></div>
                <div><label class="text-[10px] text-slate-500 font-bold mb-1 block uppercase">🖼️ Link รูปโปรไฟล์</label><input type="text" id="edit_social" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-white outline-none"></div>
                <div class="relative">
                    <label class="text-[10px] text-emerald-400 font-bold mb-1 block uppercase">🎸 จัดการเพลงแนะนำ</label>
                    <input type="text" id="song-search-input" placeholder="ค้นหาชื่อเพลง..." class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-white text-sm outline-none">
                    <div id="search-results" class="absolute z-[110] left-0 right-0 bg-slate-800 border border-slate-700 rounded-xl mt-1 hidden max-h-40 overflow-y-auto"></div>
                    <div id="selected-songs-list" class="min-h-[40px] mt-2 p-2 bg-slate-950 border border-dashed border-slate-800 rounded-xl flex flex-wrap gap-1"></div>
                    <input type="hidden" id="edit_songs">
                </div>
                <div><label class="text-[10px] text-slate-500 font-bold mb-1 block uppercase">📱 ติดต่อ/ข้อมูลวง</label><textarea id="edit_genres" rows="3" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-white text-sm outline-none"></textarea></div>
            </div>
            <div class="grid grid-cols-2 gap-3 mt-8">
                <button onclick="saveProfile()" class="bg-emerald-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg">บันทึก</button>
                <button onclick="document.getElementById('editProfileModal').classList.add('hidden')" class="bg-slate-800 text-slate-400 py-4 rounded-2xl font-black uppercase">ยกเลิก</button>
            </div>
        </div>
    </div>

    <script>
        var SB_URL = "https://uswpewtkfccqncjlmeus.supabase.co"; 
        var SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzd3Bld3RrZmNjcW5jamxtZXVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjE1MzQsImV4cCI6MjA5MDQzNzUzNH0.qQPQMzI2J_87Pu6M9FRHEeLL2hk9rabpUK4yiYOrKBc";
        var sb = supabase.createClient(SB_URL, SB_KEY);
        var artistId = new URLSearchParams(window.location.search).get('id');
        var isSystemOpen = false;
        var masterPin = "";
        var currentSelectedSongs = [];
        var activeSongName = "";

        setInterval(function() {
            document.getElementById('display-time').innerText = new Date().toLocaleTimeString('th-TH', { hour12: false, hour: '2-digit', minute: '2-digit' });
        }, 1000);

        async function initAuth() {
            if (!artistId) return alert("ไม่พบ ID ศิลปิน");
            const { data } = await sb.from('musicians').select('pin').eq('id', artistId).single();
            if (data) {
                masterPin = data.pin;
                if (localStorage.getItem('access_' + artistId) === 'true') {
                    document.getElementById('lock-screen').classList.add('hidden');
                    load();
                } else {
                    document.getElementById('lock-screen').classList.remove('hidden');
                }
            }
        }

        function checkPin() {
            const input = document.getElementById('pin-input').value;
            if (input === masterPin) {
                localStorage.setItem('access_' + artistId, 'true');
                document.getElementById('lock-screen').classList.add('hidden');
                load();
            } else {
                document.getElementById('pin-error').classList.remove('hidden');
                document.getElementById('pin-input').value = "";
            }
        }

        function executeLogout() {
            localStorage.removeItem('access_' + artistId);
            location.reload();
        }

        async function logout() {
            if (isSystemOpen) {
                const confirmClose = confirm("ระบบยังเปิดอยู่ครับ...\n\nกด [ตกลง] = ปิดระบบ + Logout\nกด [ยกเลิก] = Logout อย่างเดียว");
                if (confirmClose) {
                    await sb.from('musicians').update({ is_active: false }).eq('id', artistId);
                    executeLogout();
                    return;
                }
            }
            if (confirm("ยืนยันการออกจากระบบใช่ไหมครับ?")) { executeLogout(); }
        }

        function updateProfileImage(url, name) {
            const imgTag = document.getElementById('artist-profile-img');
            const fallback = `https://ui-avatars.com/api/?name=${encodeURIComponent(name || 'A')}&background=059669&color=fff&size=100`;
            imgTag.src = (url && url.startsWith('http')) ? url : fallback;
            imgTag.onerror = function() { this.src = fallback; this.onerror = null; };
        }

        function getLocation() {
            var listContainer = document.getElementById('venue-list');
            listContainer.innerHTML = "<p class='text-[10px] text-emerald-500 animate-pulse'>กำลังหาตำแหน่งร้าน...</p>";
            if (!navigator.geolocation) { alert("อุปกรณ์ไม่รองรับ GPS"); return; }
            navigator.geolocation.getCurrentPosition(function(pos) {
                var lat = pos.coords.latitude;
                var lon = pos.coords.longitude;
                var url = 'https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=' + lat + '&lon=' + lon + '&zoom=18';
                fetch(url).then(res => res.json()).then(data => {
                    var addr = data.address;
                    var names = [addr.amenity, addr.building, addr.shop, addr.tourism, addr.leisure, addr.restaurant, addr.bar, addr.cafe].filter(Boolean);
                    listContainer.innerHTML = "";
                    if (names.length === 0) { listContainer.innerHTML = "<p class='text-[10px] text-slate-500'>ไม่พบชื่อร้าน ลองพิมพ์เองนะครับ</p>"; return; }
                    names.forEach(name => {
                        var pill = document.createElement('button');
                        pill.className = "bg-slate-800 text-[10px] px-3 py-2 rounded-full border border-slate-700 text-emerald-400 font-bold";
                        pill.innerText = name;
                        pill.onclick = () => { document.getElementById('venue-input').value = name; listContainer.innerHTML = ""; };
                        listContainer.appendChild(pill);
                    });
                }).catch(() => { listContainer.innerHTML = ""; });
            }, () => { alert("กรุณาเปิด GPS ครับ"); listContainer.innerHTML = ""; }, { enableHighAccuracy: true });
        }

        async function load() {
            var resMusician = await sb.from('musicians').select('*').eq('id', artistId).single();
            if (resMusician.data) {
                isSystemOpen = resMusician.data.is_active;
                document.getElementById('venue-input').value = resMusician.data.current_venue || "";
                document.getElementById('display-artist-name').innerText = resMusician.data.display_name;
                updateProfileImage(resMusician.data.social_contact, resMusician.data.display_name);
                
                if (resMusician.data.genres && resMusician.data.genres.includes('drive.google.com')) {
                    const driveMatch = resMusician.data.genres.match(/(https?:\/\/drive\.google\.com[^\s]+)/);
                    if(driveMatch) document.getElementById('drive-folder-input').value = driveMatch[0];
                }
                updateUI();
            }
            var resReq = await sb.from('requests').select('*').eq('musician_id', artistId).eq('status', 'pending');
            if (resReq.data) { resReq.data.forEach(r => draw(r)); }
        }

        async function toggleSystem() {
            var v = document.getElementById('venue-input').value || "ร้านประจำ";
            var next = !isSystemOpen;
            if(!next) { document.getElementById('queue-container').innerHTML = ""; document.getElementById('history-container').innerHTML = ""; }
            await sb.from('musicians').update({ is_active: next, current_venue: v }).eq('id', artistId);
