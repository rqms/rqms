<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad Dashboard - Final</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .is-history { opacity: 0.4 !important; filter: grayscale(1); transform: scale(0.9); border-left-color: #475569 !important; }
        .request-card { transition: all 0.2s ease; margin-bottom: 1rem; }
        button:active { background-color: #000 !important; transform: scale(0.95); }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen p-4 font-sans">

    <div class="mb-6 p-4 rounded-2xl bg-slate-900 border border-slate-800 flex justify-between items-center shadow-2xl">
        <div class="flex items-center gap-4">
            <div id="status-dot" class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_red]"></div>
            <div>
                <p class="text-[8px] uppercase text-slate-500 font-bold">Status</p>
                <h2 id="status-text" class="text-lg font-black text-white uppercase leading-none">Offline</h2>
            </div>
        </div>
        <div class="border-l border-slate-800 pl-4">
            <p class="text-[8px] uppercase text-slate-500 font-bold">Artist</p>
            <h2 id="display-artist-name" class="text-lg font-black text-emerald-500 leading-none">---</h2>
        </div>
        <div class="text-right">
            <h2 id="display-time" class="text-2xl font-mono font-black text-emerald-500 leading-none">00:00:00</h2>
        </div>
    </div>

    <div class="flex gap-2 mb-8">
        <input type="text" id="venue-input" placeholder="ระบุชื่อร้าน..." class="bg-slate-900 border border-slate-700 p-4 rounded-xl flex-1 text-white font-bold">
        <button id="system-btn" onclick="toggleSystem()" class="bg-emerald-600 px-8 py-4 rounded-xl font-black uppercase shadow-lg text-white">เปิดระบบ</button>
    </div>

    <div class="mb-10">
        <h3 class="text-emerald-400 font-bold text-xs mb-4 italic px-2">🔥 NEW REQUESTS</h3>
        <div id="queue-container"></div>
    </div>

    <div class="border-t border-slate-800 pt-10 pb-20">
        <h3 class="text-slate-500 font-bold text-xs mb-4 italic px-2">💾 HISTORY</h3>
        <div id="history-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <script>
        const SB_URL = "https://uswpewtkfccqncjlmeus.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzd3Bld3RrZmNjcW5jamxtZXVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjE1MzQsImV4cCI6MjA5MDQzNzUzNH0.qQPQMzI2J_87Pu6M9FRHEeLL2hk9rabpUK4yiYOrKBc";
        const sb = supabase.createClient(SB_URL, SB_KEY);
        const artistId = new URLSearchParams(window.location.search).get('id');
        let isSystemOpen = false;

        // 1. นาฬิกา
        setInterval(() => { document.getElementById('display-time').innerText = new Date().toLocaleTimeString('th-TH', { hour12: false }); }, 1000);

        // 2. ฟังก์ชันจัดการเพลง (แบบ Hard-Code ย้ายทันที)
        async function solve(id, status) {
            console.log("Solving ID:", id);
            const card = document.getElementById('card-' + id);
            const historyBox = document.getElementById('history-container');
            
            if (card) {
                // 1. ลบปุ่มทิ้งทันทีไม่ต้องรอ
                const btnArea = card.querySelector('.btn-area');
                if(btnArea) btnArea.remove();

                // 2. แปะสถานะ
                const label = document.createElement('div');
                label.className = status === 'ok' ? "text-emerald-500 font-bold text-xs" : "text-red-500 font-bold text-xs";
                label.innerText = status === 'ok' ? "PLAYED ✅" : "DECLINED ❌";
                card.appendChild(label);

                // 3. ย้ายที่วางลงข้างล่าง
                card.classList.add('is-history');
                historyBox.prepend(card);

                // 4. สั่งลบใน Database เบื้องหลัง (ไม่รอผล)
                sb.from('requests').delete().eq('id', id).then(() => console.log("Deleted from DB"));
            }
        }

        // 3. วาดการ์ดเพลง
        function draw(req) {
            if (document.getElementById('card-' + req.id)) return;
            const container = document.getElementById('queue-container');
            const div = document.createElement('div');
            div.id = 'card-' + req.id;
            div.className = "request-card bg-slate-900 border-l-4 border-emerald-500 p-5 rounded-xl shadow-lg flex justify-between items-center";
            div.innerHTML = `
                <div>
                    <p class="text-[9px] text-slate-500 font-bold mb-1">REQ: ${req.customer_name || 'Anonymous'}</p>
                    <h3 class="text-lg font-black text-white">${req.song_name}</h3>
                </div>
                <div class="btn-area flex gap-2">
                    <button onclick="solve(${req.id}, 'ok')" class="bg-emerald-600 text-white px-5 py-3 rounded-xl font-bold text-sm">เล่นได้</button>
                    <button onclick="solve(${req.id}, 'no')" class="bg-red-600 text-white px-5 py-3 rounded-xl font-bold text-sm">ไม่ได้</button>
                </div>
            `;
            container.prepend(div);
        }

        // 4. โหลดข้อมูล (กันรีเฟรชแล้วหาย)
        async function load() {
            if (!artistId) return;
            // ดึงข้อมูลศิลปิน
            const { data: m } = await sb.from('musicians').select('*').eq('id', artistId).single();
            if (m) {
                isSystemOpen = m.is_active;
                document.getElementById('venue-input').value = m.current_venue || "";
                document.getElementById('display-artist-name').innerText = m.display_name || m.name;
                updateUI(m.current_venue);
            }
            // ดึงเพลงที่ยังค้างอยู่
            const { data: r } = await sb.from('requests').select('*').eq('musician_id', artistId);
            if (r) { r.forEach(item => draw(item)); }
        }

        // 5. ระบบ Real-time
        sb.channel('db-req').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'requests', filter: 'musician_id=eq.'+artistId }, 
            p => draw(p.new)).subscribe();

        // 6. เปิด-ปิดระบบ
        async function toggleSystem() {
            const v = document.getElementById('venue-input').value || "ร้านประจำ";
            const next = !isSystemOpen;
            if(!next) { document.getElementById('queue-container').innerHTML = ""; document.getElementById('history-container').innerHTML = ""; }
            const { error } = await sb.from('musicians').update({ is_active: next, current_venue: v }).eq('id', artistId);
            if (!error) { isSystemOpen = next; updateUI(v); }
        }

        function updateUI(v) {
            const b = document.getElementById('system-btn');
            const d = document.getElementById('status-dot');
            const s = document.getElementById('status-text');
            if (isSystemOpen) {
                b.innerText = "ปิดระบบ"; b.className = "bg-red-600 text-white px-8 py-4 rounded-xl font-black";
                d.className = "w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]";
                s.innerText = "Online";
            } else {
                b.innerText = "เปิดระบบ"; b.className = "bg-emerald-600 text-white px-8 py-4 rounded-xl font-black";
                d.className = "w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_red]";
                s.innerText = "Offline";
            }
        }

        load();
    </script>
</body>
</html>
