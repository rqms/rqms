<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ขอเพลง - RQMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .glass-card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-[#020617] text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full space-y-4">
        <div id="loading-screen" class="text-center p-10 glass-card rounded-[2.5rem]">
            <div id="spinner" class="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <h2 id="status-title" class="text-2xl font-black text-emerald-400 mb-2 uppercase">RQMS</h2>
            <p id="status-desc" class="text-slate-400 text-sm">กำลังตรวจสอบสถานะการแสดง...</p>
        </div>

        <div id="request-form" class="hidden glass-card rounded-[2.5rem] p-8 shadow-2xl space-y-6">
            <div class="text-center space-y-3">
                <img id="artist-img" src="" class="w-20 h-20 rounded-full mx-auto border-2 border-emerald-500 p-1 object-cover bg-slate-800">
                <div>
                    <h2 id="artist-display-name" class="text-2xl font-black text-white">---</h2>
                    <p id="venue-display-name" class="text-emerald-400 font-bold text-xs uppercase tracking-widest mt-1">---</p>
                </div>
            </div>
            
            <div class="space-y-4">
                <input type="text" id="song" placeholder="ชื่อเพลง / ศิลปิน" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-700 outline-none focus:border-emerald-500 text-white font-bold">
                <input type="text" id="user" placeholder="จากคุณ..." class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-700 outline-none focus:border-emerald-500 text-white text-sm">
                
                <button onclick="sendSong()" id="send-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-all">
                    ส่งเพลงขอ 🚀
                </button>
            </div>

            <div id="tip-area" class="hidden pt-6 border-t border-slate-800 text-center">
                <p class="text-[10px] text-slate-500 mb-3 uppercase font-bold italic">Support Artist</p>
                <div class="flex gap-2">
                    <button onclick="copyPromptPay()" class="flex-1 bg-slate-800 p-3 rounded-xl border border-slate-700 text-xs font-bold text-slate-300">
                        📋 คัดลอกเลขพร้อมเพย์
                    </button>
                    <button onclick="showQR()" class="bg-amber-600/20 border border-amber-600/50 p-3 rounded-xl text-lg">📸</button>
                </div>
            </div>
        </div>
    </div>

    <div id="qr-modal" onclick="this.classList.add('hidden')" class="fixed inset-0 z-[100] bg-black/90 hidden flex items-center justify-center p-8">
        <div class="bg-white p-6 rounded-3xl text-center max-w-xs w-full">
            <img id="promptpay-qr" src="" class="w-full mb-2">
            <p class="text-slate-900 font-black text-sm uppercase">Scan to Tip</p>
            <p class="text-slate-400 text-[10px] mt-1">แตะเพื่อปิด</p>
        </div>
    </div>

    <script>
        const SB_URL = "https://uswpewtkfccqncjlmeus.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzd3Bld3RrZmNjcW5jamxtZXVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjE1MzQsImV4cCI6MjA5MDQzNzUzNH0.qQPQMzI2J_87Pu6M9FRHEeLL2hk9rabpUK4yiYOrKBc";
        const sbClient = supabase.createClient(SB_URL, SB_KEY);
        const artistId = new URLSearchParams(window.location.search).get('id');

        let currentPromptPay = "";

        async function checkStatus() {
            if(!artistId) return;

            const { data, error } = await sbClient
                .from('musicians')
                .select('*')
                .eq('id', artistId)
                .single();

            const loadingScreen = document.getElementById('loading-screen');
            const requestForm = document.getElementById('request-form');

            // 1. ตรวจสอบว่าระบบ "เปิด" อยู่หรือไม่
            if (data && data.is_active === true) {
                loadingScreen.classList.add('hidden');
                requestForm.classList.remove('hidden');
                
                // อัปเดตชื่อศิลปินและร้าน
                document.getElementById('artist-display-name').innerText = data.display_name;
                document.getElementById('venue-display-name').innerText = data.current_venue || "กำลังแสดงสด";

                // 2. จัดการเรื่องรูป Profile (ดึงจาก social_contact)
                updateProfilePic(data.display_name, data.social_contact);

                // 3. จัดการเรื่อง Tip
                if (data.promptpay) {
                    currentPromptPay = data.promptpay;
                    document.getElementById('tip-area').classList.remove('hidden');
                } else {
                    document.getElementById('tip-area').classList.add('hidden');
                }
            } else {
                // ถ้าปิดระบบ (is_active เป็น false หรือหา data ไม่เจอ)
                loadingScreen.classList.remove('hidden');
                requestForm.classList.add('hidden');
                document.getElementById('spinner').classList.add('hidden');
                document.getElementById('status-title').innerText = "CLOSED";
                document.getElementById('status-desc').innerText = "ขณะนี้ศิลปินยังไม่เปิดรับคำขอเพลงครับ";
            }
        }

        function updateProfilePic(name, social) {
            const imgTag = document.getElementById('artist-img');
            // ถ้ามีคำว่า facebook ในช่องโซเชียล ให้ดึงรูปจาก FB
            if (social && social.includes('facebook.com/')) {
                try {
                    const parts = social.split('facebook.com/')[1].split('/')[0].split('?')[0];
                    imgTag.src = `https://graph.facebook.com/${parts}/picture?type=large`;
                } catch(e) {
                    imgTag.src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(name)}`;
                }
            } else {
                // ถ้าไม่มีโซเชียล ให้ใช้ตัวการ์ตูน DiceBear กันรูปพัง
                imgTag.src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(name)}`;
            }
        }

        async function sendSong() {
            const song = document.getElementById('song').value;
            const user = document.getElementById('user').value;
            if(!song) return alert("ใส่ชื่อเพลงด้วยครับ!");

            const btn = document.getElementById('send-btn');
            btn.disabled = true;
            btn.innerText = "กำลังส่ง...";

            const { error } = await sbClient
                .from('requests')
                .insert([{ musician_id: artistId, song_name: song, customer_name: user }]);

            if(!error) {
                alert("ส่งเพลงแล้ว! รอฟังนะครับ 🎸");
                document.getElementById('song').value = "";
            }
            btn.disabled = false;
            btn.innerText = "ส่งเพลงขอ 🚀";
        }

        function copyPromptPay() {
            navigator.clipboard.writeText(currentPromptPay);
            alert("คัดลอกเลขพร้อมเพย์แล้วครับ!");
        }

        function showQR() {
            document.getElementById('promptpay-qr').src = `https://promptpay.io/${currentPromptPay}.png`;
            document.getElementById('qr-modal').classList.remove('hidden');
        }

        // เช็คสถานะทุก 5 วินาที
        setInterval(checkStatus, 5000);
        checkStatus();
    </script>
</body>
</html>
