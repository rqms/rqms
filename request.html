<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ขอเพลง - RQMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .glass-card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        #song-results { max-height: 200px; overflow-y: auto; z-index: 50; }
        .song-item:hover { background-color: #059669; }
        .song-pill { transition: all 0.2s ease; border: 1px solid rgba(16, 185, 129, 0.2); }
        .song-pill:active { transform: scale(0.95); background-color: #059669; color: white; }
    </style>
</head>
<body class="bg-[#020617] text-white min-h-screen p-4 font-sans flex flex-col items-center">

    <div class="max-w-md w-full space-y-4">
        <div class="w-full bg-emerald-950/20 border border-emerald-500/20 rounded-2xl overflow-hidden py-3 px-4 shadow-lg">
            <div class="flex items-center gap-3">
                <span class="flex-shrink-0 flex items-center gap-1.5 bg-emerald-500/10 text-emerald-400 text-[10px] font-black px-2 py-1 rounded-full border border-emerald-500/30 uppercase tracking-tighter">
                    <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-ping"></span>
                    Live Mode
                </span>
                <marquee class="text-xs font-bold text-slate-300 tracking-wide">
                    🎸 ขอเพลงได้ตลอดคืนครับ... | 🙏 สนับสนุนนักดนตรี (Tip) ได้ที่ปุ่มด้านล่าง | 🚀 ระบบส่งเพลงรวดเร็วทันใจ
                </marquee>
            </div>
        </div>

        <div id="loading-screen" class="text-center p-10 glass-card rounded-[2.5rem]">
            <div id="spinner" class="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <h2 id="status-title" class="text-2xl font-black text-emerald-400 mb-2">RQMS</h2>
            <p id="status-desc" class="text-slate-400 text-sm italic">กำลังรอสัญญาณจากเวที...</p>
        </div>

        <div id="request-form" class="hidden glass-card rounded-[2.5rem] p-8 shadow-2xl space-y-6 relative border border-white/5">
            <div class="text-center space-y-3">
                <img id="artist-img" src="" class="w-20 h-20 rounded-full mx-auto border-2 border-emerald-500 p-1 object-cover bg-slate-800">
                <h2 id="artist-display-name" class="text-2xl font-black text-white leading-none">---</h2>
                <p id="venue-display-name" class="text-emerald-400 font-bold text-[10px] uppercase tracking-widest mt-2">LIVE NOW</p>
            </div>

            <div id="recommended-section" class="hidden space-y-3">
                <p class="text-[10px] text-emerald-500 font-black uppercase tracking-widest italic px-1">✨ เพลงแนะนำ</p>
                <div id="recommended-list" class="flex flex-wrap gap-2"></div>
            </div>
            
            <div class="space-y-4 relative border-b border-slate-800 pb-6">
                <div class="relative">
                    <input type="text" id="song" oninput="searchMusic(this.value)" placeholder="🔍 พิมพ์ชื่อเพลงหรือศิลปิน..." autocomplete="off" class="w-full p-4 bg-slate-900/50 rounded-2xl border border-slate-700 outline-none focus:border-emerald-500 text-white font-bold">
                    <div id="song-results" class="hidden absolute left-0 right-0 mt-2 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl z-50"></div>
                </div>
                <input type="text" id="user" placeholder="จากคุณ..." class="w-full p-4 bg-slate-900/50 rounded-2xl border border-slate-700 outline-none focus:border-emerald-500 text-white text-sm">
                <button onclick="sendSong()" id="send-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-black text-lg active:scale-95 transition-all shadow-lg">ส่งเพลงขอ 🚀</button>
            </div>

            <div id="tip-area" class="hidden text-center pb-2">
                <div class="flex gap-2">
                    <button onclick="copyPromptPay()" class="flex-1 bg-slate-800 p-3 rounded-xl border border-slate-700 text-[11px] font-bold text-slate-300 italic">📋 คัดลอกพร้อมเพย์</button> 
                    <button onclick="showQR()" class="bg-amber-600/20 border border-amber-500/50 p-3 rounded-xl text-xl">📸</button>
                </div>
            </div>

            <div id="status-container" class="hidden pt-4 border-t border-slate-800 space-y-2">
                <p class="text-[9px] text-emerald-500 font-black uppercase tracking-widest italic px-1 text-center">คิวเพลงล่าสุด</p>
                <div id="status-display" class="space-y-2"></div>
            </div>
        </div>

        <div id="affiliate-card" class="glass-card rounded-3xl p-4 flex items-center gap-4 border-dashed border-slate-700 shadow-xl">
            <div class="w-14 h-14 bg-white rounded-xl flex-shrink-0 flex items-center justify-center p-1 overflow-hidden">
                <img id="aff-img" src="https://via.placeholder.com/150" class="object-cover w-full h-full rounded-lg">
            </div>
            <div class="flex-1 min-w-0">
                <p id="aff-platform-label" class="text-[9px] text-orange-400 font-bold uppercase tracking-tighter">Shopee Recommended</p>
                <h4 id="aff-title" class="text-xs font-bold text-white truncate italic">กำลังหาสินค้าที่น่าสนใจ...</h4>
                <a id="aff-link" href="#" target="_blank" class="text-[9px] text-slate-500 underline">เช็คราคาที่ร้านค้า</a>
            </div>
            <a id="aff-buy-btn" href="#" target="_blank" class="bg-orange-600 px-3 py-2 rounded-lg text-[10px] font-black uppercase text-center min-w-[60px]">ซื้อ</a>
        </div>
    </div>

    <div id="qr-modal" onclick="this.classList.add('hidden')" class="fixed inset-0 z-[100] bg-black/95 hidden flex items-center justify-center p-8 backdrop-blur-sm">
        <div class="bg-white p-6 rounded-[2.5rem] text-center max-w-xs w-full">
            <img id="promptpay-qr" src="" class="w-full mb-3 rounded-xl">
            <p class="text-slate-900 font-black text-sm uppercase italic">THANK YOU</p>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const MY_SHOPEE_ID = "15301320155"; 
        const MY_LAZADA_ID = "307781178"; 

        const SB_URL = "https://uswpewtkfccqncjlmeus.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzd3Bld3RrZmNjcW5jamxtZXVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjE1MzQsImV4cCI6MjA5MDQzNzUzNH0.qQPQMzI2J_87Pu6M9FRHEeLL2hk9rabpUK4yiYOrKBc";
        const sbClient = supabase.createClient(SB_URL, SB_KEY);
        const artistId = new URLSearchParams(window.location.search).get('id');
        let currentPromptPay = "";

        // --- 2. CORE FUNCTIONS ---
        async function checkStatus() {
            if(!artistId) return;
            const { data } = await sbClient.from('musicians').select('*').eq('id', artistId).single();
            if (data && data.is_active) {
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('request-form').classList.remove('hidden');
                document.getElementById('artist-display-name').innerText = data.display_name || "---";
                document.getElementById('venue-display-name').innerText = data.current_venue || "LIVE NOW";
                
                const imgTag = document.getElementById('artist-img');
                const fallback = `https://ui-avatars.com/api/?name=${encodeURIComponent(data.display_name || 'A')}&background=059669&color=fff&size=128`;
                imgTag.src = (data.social_contact && data.social_contact.startsWith('http')) ? data.social_contact : fallback;

                if (data.recommended_songs) {
                    const songs = data.recommended_songs.split(/[\n,]+/).filter(s => s.trim() !== "");
                    document.getElementById('recommended-section').classList.toggle('hidden', songs.length === 0);
                    document.getElementById('recommended-list').innerHTML = songs.map(s => `<button onclick="selectSong('${s.trim()}')" class="song-pill bg-emerald-500/10 text-emerald-400 text-[11px] font-bold px-3 py-2 rounded-xl border border-emerald-500/20">${s.trim()}</button>`).join('');
                }

                if (data.promptpay) {
                    currentPromptPay = data.promptpay.toString();
                    document.getElementById('tip-area').classList.remove('hidden');
                }
                syncSongStatus();
            } else {
                document.getElementById('loading-screen').classList.remove('hidden');
                document.getElementById('request-form').classList.add('hidden');
                document.getElementById('status-container').classList.add('hidden');
            }
        }

        async function syncSongStatus() {
            if(!artistId || document.getElementById('request-form').classList.contains('hidden')) return;
            const { data } = await sbClient.from('requests').select('song_name, status').eq('musician_id', artistId).order('created_at', { ascending: false }).limit(3);
            const container = document.getElementById('status-container');
            const display = document.getElementById('status-display');
            
            if (data && data.length > 0) {
                container.classList.remove('hidden');
                display.innerHTML = data.map(item => {
                    let color = "text-slate-400", text = "รอคิว...";
                    if(item.status === 'played') { color = "text-emerald-400"; text = "เล่นแล้ว ✅"; }
                    if(item.status === 'declined') { color = "text-red-400"; text = "ข้าม ❌"; }
                    return `<div class="bg-slate-900/30 p-2.5 rounded-xl border border-slate-800/50 flex justify-between items-center text-[10px]">
                        <span class="text-slate-300 truncate flex-1 mr-2">${item.song_name}</span>
                        <span class="font-bold ${color}">${text}</span>
                    </div>`;
                }).join('');
            } else {
                container.classList.add('hidden');
            }
        }

        // --- 4. SMART AFFILIATE (Enhanced Random & Fix Image) ---
        function loadSmartAffiliate(songName = "") {
            const song = songName.toLowerCase();
            const platforms = ['SHOPEE', 'LAZADA'];
            const platform = platforms[Math.floor(Math.random() * platforms.length)];
            
            // คลังสินค้าสุ่ม
            const generalItems = [
                { title: "สายกีตาร์ Elixir เบอร์ 10", kw: "elixir guitar strings", img: "https://www.musicarms.net/wp-content/uploads/2017/05/Elixir-12052.jpg" },
                { title: "คาโป้กีตาร์อลูมิเนียม", kw: "guitar capo", img: "https://images.unsplash.com/photo-1519832584003-88ec0c53846c?q=80&w=200&auto=format&fit=crop" },
                { title: "ปิ๊กกีตาร์ Fender 12 ชิ้น", kw: "fender guitar picks", img: "https://images.unsplash.com/photo-1550985616-10810253b84d?q=80&w=200&auto=format&fit=crop" },
                { title: "หูฟัง In-Ear Monitor", kw: "KZ IEM", img: "https://images.unsplash.com/photo-1613040809024-b4ef7ba99bc3?q=80&w=200&auto=format&fit=crop" }
            ];

            const sadItems = [
                { title: "ทิชชู่อย่างดี ซับน้ำตาเกรดพรีเมียม", kw: "tissue soft pack", img: "https://images.unsplash.com/photo-1620912189865-1e8a33da4c59?q=80&w=200&auto=format&fit=crop" },
                { title: "หมอนอิงนุ่มๆ ไว้กอดปลอบใจ", kw: "soft pillow", img: "https://images.unsplash.com/photo-1584100936595-c0654b55a2e6?q=80&w=200&auto=format&fit=crop" }
            ];

            const partyItems = [
                { title: "วิตามินแก้แฮงค์ บำรุงตับ", kw: "แก้แฮงค์", img: "https://images.unsplash.com/photo-1584017945366-b97b0e491f07?q=80&w=200&auto=format&fit=crop" },
                { title: "แก้วเก็บความเย็น 24 ชม.", kw: "tyeso tumbler", img: "https://images.unsplash.com/photo-1610768207795-721696980313?q=80&w=200&auto=format&fit=crop" }
            ];

            let selectedItem;
            if (song.includes("เศร้า") || song.includes("เลิก") || song.includes("อกหัก") || song.includes("เสียใจ")) {
                selectedItem = sadItems[Math.floor(Math.random() * sadItems.length)];
            } else if (song.includes("เมา") || song.includes("เหล้า") || song.includes("เบียร์") || song.includes("สายย่อ")) {
                selectedItem = partyItems[Math.floor(Math.random() * partyItems.length)];
            } else {
                selectedItem = generalItems[Math.floor(Math.random() * generalItems.length)];
            }

            // สร้างลิงก์ Tracking
            let affLink = "";
            if (platform === 'SHOPEE') {
                affLink = `https://shopee.co.th/search?keyword=${encodeURIComponent(selectedItem.kw)}&utm_content=${MY_SHOPEE_ID}`;
            } else {
                affLink = `https://www.lazada.co.th/catalog/?q=${encodeURIComponent(selectedItem.kw)}&aff_id=${MY_LAZADA_ID}`;
            }

            // อัปเดต UI
            const affImg = document.getElementById('aff-img');
            const affTitle = document.getElementById('aff-title');
            const affLinkText = document.getElementById('aff-link');
            const affBtn = document.getElementById('aff-buy-btn');
            const affLabel = document.getElementById('aff-platform-label');

            affImg.src = selectedItem.img;
            affTitle.innerText = selectedItem.title;
            affLinkText.href = affLink;
            affBtn.href = affLink;
            affBtn.innerText = platform;
            affLabel.innerText = platform + " RECOMMENDED";
            affBtn.style.backgroundColor = (platform === 'SHOPEE') ? "#ea580c" : "#1e40af";
        }

        // --- 5. OTHERS ---
        window.selectSong = (val) => {
            document.getElementById('song').value = val;
            document.getElementById('song-results').classList.add('hidden');
            loadSmartAffiliate(val); // อัปเดตสินค้าเมื่อเลือกเพลง
        };

        async function searchMusic(query) {
            const resultsDiv = document.getElementById('song-results');
            if (query.length < 2) { 
                resultsDiv.classList.add('hidden'); 
                return; 
            }
            try {
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=5&country=th`);
                const data = await response.json();
                resultsDiv.innerHTML = data.results.map(item => `
                    <div class="song-item p-3 border-b border-slate-700 cursor-pointer flex items-center gap-3" 
                         onclick="selectSong('${item.trackName} - ${item.artistName}')">
                        <img src="${item.artworkUrl30}" class="rounded">
                        <div class="text-left">
                            <p class="text-xs font-bold text-white">${item.trackName}</p>
                            <p class="text-[10px] text-slate-400">${item.artistName}</p>
                        </div>
                    </div>`).join('');
                resultsDiv.classList.remove('hidden');
                loadSmartAffiliate(query); // สุ่มสินค้าตามคำที่พิมพ์ค้นหา
            } catch (e) { console.error(e); }
        }

        async function sendSong() {
            const song = document.getElementById('song').value;
            const user = document.getElementById('user').value;
            if(!song) return alert("ใส่ชื่อเพลงก่อนครับ!");
            const btn = document.getElementById('send-btn');
            btn.disabled = true; btn.innerText = "ส่งแล้ว...";
            const { error } = await sbClient.from('requests').insert([{ musician_id: artistId, song_name: song, customer_name: user }]);
            if(!error) { alert("ส่งเพลงสำเร็จ!"); document.getElementById('song').value = ""; syncSongStatus(); }
            btn.disabled = false; btn.innerText = "ส่งเพลงขอ 🚀";
        }

        function showQR() {
            if(!currentPromptPay) return alert("ยังไม่ได้ตั้งค่าพร้อมเพย์");
            document.getElementById('promptpay-qr').src = `https://promptpay.io/${currentPromptPay}.png`;
            document.getElementById('qr-modal').classList.remove('hidden');
        }

        window.copyPromptPay = () => {
            if (!currentPromptPay) return;
            navigator.clipboard.writeText(currentPromptPay.replace(/\D/g, '')).then(() => alert("คัดลอกพร้อมเพย์แล้ว!"));
        };

        // เริ่มต้นทำงาน
        checkStatus();
        loadSmartAffiliate(""); // สุ่มครั้งแรกเมื่อโหลดหน้า
        setInterval(checkStatus, 15000); 
        setInterval(syncSongStatus, 10000);
    </script>
</body>
</html>
